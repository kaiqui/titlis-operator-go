apiVersion: titlis.io/v1
kind: ServiceDefinition
metadata:
  name: titlis-operator-go
  workload_match:
    namespaces: [titlis-preprod, titlis-prod]
    name_pattern: "^titlis-operator(-go)?(-.*)?$"
spec:
  owner:
    team: platform
    contacts:
      - type: slack
        value: "#platform-oncall"
  gitops:
    layout: folder_per_env
    paths:
      dev:
        path: manifest/kubernetes/develop/deploy.yaml
        base_branch: develop
      hml:
        path: manifest/kubernetes/release/deploy.yaml
        base_branch: release
      prd:
        path: manifest/kubernetes/main/deploy.yaml
        base_branch: main
    pipeline_watcher: argocd
  remediation:
    enabled: true
    overrides:
      hpa_environment_templates:
        dev: { min: 1, max: 1, target_cpu: 80 }
        hml: { min: 1, max: 1, target_cpu: 80 }
        prd: { min: 1, max: 2, target_cpu: 70 }
