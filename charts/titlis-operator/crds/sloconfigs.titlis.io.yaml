apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sloconfigs.titlis.io
spec:
  group: titlis.io
  scope: Namespaced
  names:
    kind: SLOConfig
    plural: sloconfigs
    singular: sloconfig
    shortNames:
      - sloc
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: State
          type: string
          jsonPath: .status.state
        - name: SLO-ID
          type: string
          jsonPath: .status.slo_id
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [service, target]
              properties:
                service:
                  type: string
                type:
                  type: string
                  enum: [metric, monitor, time_slice]
                target:
                  type: number
                warning:
                  type: number
                timeframe:
                  type: string
                  enum: [7d, 30d, 90d]
                app_framework:
                  type: string
                  enum: [wsgi, fastapi, aiohttp]
                auto_detect_framework:
                  type: boolean
                  default: false
                numerator:
                  type: string
                denominator:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                slo_id:
                  type: string
                state:
                  type: string
                  enum: [pending, synced, error]
                last_sync:
                  type: string
                  format: date-time
                error:
                  type: string
                detected_framework:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
