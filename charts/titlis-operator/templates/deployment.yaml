apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "titlis.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "titlis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "titlis.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "titlis.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "titlis.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Non-secret config from ConfigMap ─────────────────────────────
          envFrom:
            - configMapRef:
                name: {{ printf "%s-config" (include "titlis.fullname" .) }}

          env:
            # ── Downward API ────────────────────────────────────────────────
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # ── Datadog secrets ─────────────────────────────────────────────
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datadog.secretName }}
                  key: api-key
            - name: DD_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datadog.secretName }}
                  key: app-key

            # ── Slack secrets (optional) ────────────────────────────────────
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slack.secretName }}
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slack.secretName }}
                  key: SLACK_WEBHOOK_URL
                  optional: true

            # ── titlis-api secret (optional) ────────────────────────────────
            - name: TITLIS_API_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.titlisApi.secretName }}
                  key: TITLIS_API_API_KEY
                  optional: true
