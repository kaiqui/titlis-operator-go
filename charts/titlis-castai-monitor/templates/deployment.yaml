apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "castai.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "castai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "castai.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "castai.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "castai.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: castai-monitor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/castai-monitor"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: ENABLE_CASTAI_MONITOR
              value: {{ .Values.castai.enabled | quote }}
            - name: CASTAI_MONITOR_NAMESPACE
              value: {{ .Values.castai.monitorNamespace | quote }}
            - name: CASTAI_MONITOR_INTERVAL_SECONDS
              value: {{ .Values.castai.intervalSeconds | quote }}
            - name: CASTAI_CLUSTER_NAME
              value: {{ .Values.castai.clusterName | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}

            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datadog.secretName }}
                  key: api-key
            - name: DD_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datadog.secretName }}
                  key: app-key
            - name: DD_SITE
              value: {{ .Values.datadog.site | quote }}

            - name: CASTAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.castai.secretName }}
                  key: CASTAI_API_KEY
                  optional: true
            - name: CASTAI_CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.castai.secretName }}
                  key: CASTAI_CLUSTER_ID
                  optional: true
