apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synthetic.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "synthetic.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "synthetic.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "synthetic.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "synthetic.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: synthetic-monitor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/synthetic-monitor"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: SYNTHETIC_CHECKS_CONFIG_PATH
              value: {{ .Values.synthetic.configPath | quote }}
            - name: ENABLE_SYNTHETIC_MONITOR
              value: "true"
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: DD_SITE
              value: {{ .Values.datadog.site | quote }}

            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datadog.secretName }}
                  key: api-key
            - name: DD_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datadog.secretName }}
                  key: app-key
